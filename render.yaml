services:
  # ── UN SEUL SERVICE : Backend API + Frontend React ─────────────────────────
  - type: web
    name: enfants-adam-backend
    env: node
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NUMERO_H
        value: "G0C0P0R0E0F0 0"
      - key: CORS_ORIGIN
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: DISABLE_IA_AUTO_START
        value: "true"
      - key: MAX_FILE_SIZE
        value: "10485760"
    healthCheckPath: /api/health
